<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Callback</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
        .container { text-align: left; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 800px; word-wrap: break-word; }
        h1 { color: #333; }
        .token-info { margin-top: 20px; }
        .token-info p { background: #eee; padding: 10px; border-radius: 4px; font-family: monospace; }
        .token-info strong { color: #4CAF50; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Login Successful!</h1>
        <div class="token-info">
            <p><strong>Parent ID:</strong> <span id="parent-id"></span></p>
            <p><strong>Access Token:</strong> <span id="access-token"></span></p>
            <p><strong>Firebase Custom Token:</strong> <span id="firebase-token"></span></p>
        </div>
    </div>

    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            document.getElementById('parent-id').textContent = params.get('parent_id') || 'Not found';
            document.getElementById('access-token').textContent = params.get('access_token') || 'Not found';
            document.getElementById('firebase-token').textContent = params.get('firebase_custom_token') || 'Not found';
        };
    </script>
</body>
</html>
